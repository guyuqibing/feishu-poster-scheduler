name: 每日海报定时发送

on:
  # 早安海报 - 每天 UTC 1:00 (北京时间 9:00)
  schedule:
    - cron: '0 1 * * *'
  # 健康海报 - 每天 UTC 5:00 (北京时间 13:00)
    - cron: '0 5 * * *'

  # 手动触发（用于测试）
  workflow_dispatch:
    inputs:
      scene_type:
        description: '场景类型 (morning/health)'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - health

jobs:
  send-morning-poster:
    if: github.event.schedule == '0 1 * * *'
    runs-on: ubuntu-latest
    steps:
